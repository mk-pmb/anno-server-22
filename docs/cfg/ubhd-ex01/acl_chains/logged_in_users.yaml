%YAML 1.2
# -*- coding: UTF-8, tab-width: 4 -*-
---

'^':

  - param: 'serviceId'
    if:
        paramInList:
          - 'anno-frontend-tests'
    decide:
        create: allow
        create_across_services: allow
        read: allow
    sideEffects:
      - :: debugDumpMeta


  - param: 'serviceId'
    if:
        paramInList:
          - 'diglit'
          - 'klorsch-bib'
          - 'klorsch-archiv'
    aclSubChain: 'diglit-like_services'


  - param: 'serviceId'
    if:
        paramInList:
          - 'journals'
    aclSubChain: 'journal-like_services'
















